{% extends "base.html" %}

{% block content %}
<div class="card">
    <div class="card-header">
        <h3>Decrypted Message</h3>
    </div>
    <div class="card-body">
        <div class="form-group">
            <h3>Secret Message</h3>
            <label for="message" style="display:none;">Decrypted Message:</label>
            <textarea class="form-control" rows="5" readonly>{{ message }}</textarea>
        </div>
        <div class="form-group">
            <h3>Accuracy</h3>
            <label for="accuracy" style="display:none;">ML Predicted Accuracy:</label>
            <input type="text" class="form-control" value="{{ accuracy }}" readonly>
        </div>
        <a href="{{ url_for('dashboard') }}" class="btn btn-secondary">Back to Dashboard</a>
    </div>
</div>
{% endblock %}
